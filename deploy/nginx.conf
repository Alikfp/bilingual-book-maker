server {
    listen 80;
    listen [::]:80;

    # Replace with your domain, or use _ for IP-only access
    server_name _;

    root /var/www/bilingual-book-maker;
    index index.html;

    # Serve the whole project tree (web/, books/, index.html)
    location / {
        try_files $uri $uri/ =404;
    }

    # Catalog changes on every deploy — never cache it
    location = /books/catalog.json {
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    # MP3 / JSON — allow range requests (iOS audio seeking)
    location ~* \.(mp3|json)$ {
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
    }
}
